"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](color_purple)\
$os\
$custom\
[¯é░](bg:color_green fg:color_purple)\
$directory\
[¯é░](fg:color_green bg:color_gold)\
$git_branch\
$git_status\
[¯é░](fg:color_gold bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:color_blue bg:color_cyan)\
$docker_context\
$conda\
$pixi\
[¯é░](fg:color_cyan bg:color_bg3)\
$time\
[¯é┤ ](fg:color_bg3)\
$line_break$character"""

palette = 'wormlogic_nocturne'

[palettes.wormlogic_nocturne]
color_fg0 = '#ded8ea'
color_bg1 = '#140f20'
color_bg3 = '#2b223a'
color_purple = '#5a46b8'
color_green = '#719e52'
color_gold = '#d8a94f'
color_blue = '#5367b8'
color_cyan = '#529c9a'
color_magenta = '#9568c6'
color_red = '#c26387'

[os]
disabled = false
style = "bg:color_purple fg:color_fg0"
format = '[ $symbol ]($style)'

[custom.wormlogic]
command = "printf '{~} wormlogic'"
when = "true"
style = "bg:color_purple"
format = '[{](bg:color_purple fg:color_gold)[~](bg:color_purple fg:color_green)[}](bg:color_purple fg:color_gold)[ worm](bg:color_purple fg:color_green)[logic ](bg:color_purple fg:color_gold)'

[username]
disabled = true

[directory]
style = "fg:color_bg1 bg:color_green"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[git_branch]
symbol = "´Éÿ"
style = "bg:color_gold"
format = '[[ $symbol $branch ](fg:color_bg1 bg:color_gold)]($style)'

[git_status]
style = "bg:color_gold"
format = '[[($all_status$ahead_behind )](fg:color_bg1 bg:color_gold)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "¯ÿØ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "¯ëû"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:color_cyan"
format = '[[ $symbol( $context) ](fg:color_bg1 bg:color_cyan)]($style)'

[conda]
style = "bg:color_cyan"
format = '[[ $symbol( $environment) ](fg:color_bg1 bg:color_cyan)]($style)'

[pixi]
style = "bg:color_cyan"
format = '[[ $symbol( $version)( $environment) ](fg:color_bg1 bg:color_cyan)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg3"
format = '[[ ´É║ $time ](fg:color_fg0 bg:color_bg3)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[´É▓](bold fg:color_green)'
error_symbol = '[´É▓](bold fg:color_red)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_magenta)'
